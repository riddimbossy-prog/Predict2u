name: Predict2U Live Scores

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: predict2u-live-scores
  cancel-in-progress: false

jobs:
  update-live-scores:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Create score-update configuration
        shell: bash
        env:
          # Exact secret names already present in your repository.
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
          API_KEY: ${{ secrets.API_KEY }}
          SEASON: ${{ secrets.SEASON }}
          DAYS_BACK: ${{ secrets.DAYS_BACK }}
        run: |
          set -euo pipefail

          football_key="${API_FOOTBALL_KEY:-${API_KEY:-}}"
          if [[ -z "$football_key" ]]; then
            echo "Missing repository secret: API_FOOTBALL_KEY or API_KEY"
            exit 1
          fi

          cat > config.txt <<EOF
          API_KEY=${football_key}
          SEASON=${SEASON:-$(date -u +%Y)}
          DAYS_BACK=${DAYS_BACK:-1}
          EOF

      - name: Repair generated files before score update
        run: node repair-generated-conflicts.js

      - name: Fetch current scores and match minutes
        run: node fetch-scores.js

      - name: Queue favorite-match push events
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
          PUSH_DISPATCH_SECRET: ${{ secrets.PUSH_DISPATCH_SECRET }}
        run: node queue-push-events.js
        continue-on-error: true

      - name: Settle tracked engine records
        run: node track-log.js settle
        continue-on-error: true

      - name: Rebuild engine learning ledger
        run: node engine-learning.js build
        continue-on-error: true

      - name: Generate public system health
        run: node generate-site-health.js
        continue-on-error: true

      - name: Run consistency audit
        run: node audit-site.js
        continue-on-error: true

      - name: Compact generated match data
        run: node compact-generated-data.js

      - name: Rebuild compact public data bundle
        run: node build-public-data.js

      - name: Remove temporary secret configuration
        run: rm -f config.txt

      - name: Commit score snapshot
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "Predict2U Live Bot"
          git config user.email "actions@users.noreply.github.com"

          git add \
            data.js \
            current-data.js \
            data-meta.json \
            track-log.json \
            model-calibration.json \
            team-profiles.json \
            odds-calib.json \
            engine-learning-ledger.json \
            engine-learning-report.json \
            site-health.json \
            site-audit.json \
            push-event-snapshot.json 2>/dev/null || true

          if git diff --cached --quiet; then
            echo "No live-score changes."
            exit 0
          fi

          git commit -m "Update live scores and match clock"

          pushed=0
          for attempt in 1 2 3 4 5; do
            git fetch origin "${GITHUB_REF_NAME}"
            if ! git rebase -X theirs "origin/${GITHUB_REF_NAME}"; then
              git rebase --abort 2>/dev/null || true
              sleep $((attempt * 5))
              continue
            fi
            node repair-generated-conflicts.js
            node compact-generated-data.js
            node build-public-data.js
            git add -f -- data.js current-data.js data-meta.json track-log.json 2>/dev/null || true
            if ! git diff --cached --quiet; then
              git commit --amend --no-edit
            fi
            if git push origin "HEAD:${GITHUB_REF_NAME}"; then
              pushed=1
              break
            fi
            sleep $((attempt * 5))
          done
          [[ "$pushed" == "1" ]] || { echo "Could not publish after five attempts."; exit 1; }
