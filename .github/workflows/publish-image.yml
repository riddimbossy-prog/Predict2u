name: Publish daily image (fast)
# Regenerates today.png from the EXISTING data.js and redeploys GitHub Pages.
# Does NOT run the slow fetcher — use this to refresh/republish the branded
# image (and fix the today.png link) in ~1 minute. Trigger manually from the
# Actions tab ("Run workflow").
on:
  workflow_dispatch: {}
permissions:
  contents: write
  pages: write
  id-token: write
# CONCURRENCY (fixed): this manual publish runs in its OWN workflow group so a
# scheduled scores run can't cancel it. cancel-in-progress:true here means only
# that a SECOND publish supersedes an earlier publish (harmless — the newest
# code should win). It no longer shares a group with the scores workflow.
concurrency:
  group: "pages-publish"
  cancel-in-progress: true
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Generate daily branded image
        run: |
          npm install sharp --no-save || echo "sharp install issue"
          node generate-image.js || echo "image generation skipped"
      - name: Commit the regenerated image (if changed)
        run: |
          git config user.name "predicto-bot"
          git config user.email "bot@users.noreply.github.com"
          if [ -n "$(git status --porcelain today.png today.svg daily/ 2>/dev/null)" ]; then
            git add today.png today.svg daily/ 2>/dev/null
            git commit -m "Republish daily image"
            for i in 1 2 3; do
              git pull --rebase --autostash origin main && git push && { echo "image republished."; break; }
              echo "Push attempt $i failed — retrying..."
              sleep 5
            done
          else
            echo "Image unchanged."
          fi
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Upload site as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."
  deploy:
    needs: build
    runs-on: ubuntu-latest
    # Shares the real Pages DEPLOY lane, but WAITS for any in-flight deploy
    # instead of cancelling it. This is the setting that lets a scores deploy
    # and a publish deploy coexist — whoever is second simply waits ~1 min.
    concurrency:
      group: "pages-deploy"
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
