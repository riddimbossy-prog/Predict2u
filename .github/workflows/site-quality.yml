name: Predict2U Site Quality
on:
  push:
    branches: [ main, master ]
  pull_request:
  workflow_dispatch:
permissions:
  contents: read
jobs:
  release-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
      - name: Verify v264 release files
        run: |
          test -f build-public-data.js
          test -f release-security-scan.js
          test -f release-gate-v264.js
          test -f data-freshness-v264.js
          test -f engine-governance-v264.js
          test -f first-run-v264.js
          test -f current-data.js
      - name: Build rolling public data
        run: node build-public-data.js
      - name: Block leaked keys and unsafe release files
        run: node release-security-scan.js
      - name: Run stabilized product release gate
        run: node release-gate-v264.js
      - name: Enforce production performance budget
        run: node performance-budget.js
      - name: Verify PWA readiness
        run: node pwa-selftest.js
      - name: Run repository completeness preflight
        run: node repository-preflight.js
      - name: Run engine learning self-test
        run: node engine-learning-selftest.js
      - name: Run model governance self-test
        run: node model-governance-selftest.js
      - name: Validate Odds API integration
        run: node tests/odds-api-integration.test.js
      - name: Run repository consistency audit
        run: node audit-site.js
      - name: Upload deterministic reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: predict2u-v264-quality-report
          if-no-files-found: ignore
          path: |
            site-audit.json
            data-meta.json
            model-governance-audit.json
            odds-api-coverage.json
