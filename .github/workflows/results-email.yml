name: Daily results email
# Runs each morning, settles YESTERDAY's banker picks, builds a wins/losses
# results image, commits it, and emails it so you can post your record.
# Honest by design — shows wins AND losses.

on:
  schedule:
    - cron: "30 0 * * *"     # 00:30 UTC - previous night results, settled, just before the new 01:00 kickoffs
  workflow_dispatch: {}

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  results:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Build yesterday's results image
        run: |
          npm install sharp --no-save || echo "sharp install issue"
          node generate-results.js || echo "results generation skipped"
      - name: Commit results image (if any)
        run: |
          git config user.name "predicto-bot"
          git config user.email "bot@users.noreply.github.com"
          if [ -n "$(git status --porcelain results.png results/ 2>/dev/null)" ]; then
            git add results.png results.svg results/ 2>/dev/null
            git commit -m "Daily results image"
            for i in 1 2 3; do
              git pull --rebase --autostash origin main && git push && { echo "results pushed."; break; }
              echo "Push attempt $i failed — retrying..."; sleep 5
            done
          else
            echo "No results image today."
          fi
      - name: Email the results image
        if: ${{ hashFiles('results.png') != '' }}
        continue-on-error: true
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "Predict2u — Yesterday's Results"
          to: predict2u@gmail.com
          from: Predict2u Bot
          body: |
            Yesterday's banker results are attached — wins and losses, honestly.
            Post it to your channels to show the record.
            18+. Gamble responsibly.
          attachments: results.png
