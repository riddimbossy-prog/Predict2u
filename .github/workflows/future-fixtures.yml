name: Predict2U Future Fixtures

on:
  schedule:
    # Ghana/UTC: 02:15 and 14:15 every day.
    - cron: "15 2,14 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  # Shared with live-scores.yml so both jobs never write data.js together.
  group: predict2u-data-write
  cancel-in-progress: false

jobs:
  update-future-fixtures:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build fixture configuration from repository secrets
        shell: bash
        env:
          # Exact secret names already present in your repository.
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
          API_KEY: ${{ secrets.API_KEY }}
          STATS_API_KEY: ${{ secrets.STATS_API_KEY }}
          SEASON: ${{ secrets.SEASON }}
          LEAGUES: ${{ secrets.LEAGUES }}
          DAYS_BACK: ${{ secrets.DAYS_BACK }}
          DAYS_FWD: ${{ secrets.DAYS_FWD }}
          ODDS: ${{ secrets.ODDS }}
          H2H: ${{ secrets.H2H }}
          MAX_LEAGUES: ${{ secrets.MAX_LEAGUES }}
          MAX_PROBES: ${{ secrets.MAX_PROBES }}
          REQUEST_BUDGET: ${{ secrets.REQUEST_BUDGET }}
          SLEEP_MS: ${{ secrets.SLEEP_MS }}
        run: |
          set -euo pipefail

          # API_FOOTBALL_KEY is preferred. API_KEY is kept as a safe fallback.
          football_key="${API_FOOTBALL_KEY:-${API_KEY:-}}"
          if [[ -z "$football_key" ]]; then
            echo "Missing repository secret: API_FOOTBALL_KEY or API_KEY"
            exit 1
          fi

          season="${SEASON:-$(date -u +%Y)}"
          leagues="${LEAGUES:-1,2,3,39,140,135,78,61,88,94,144,203,71,128,253,307}"
          days_back="${DAYS_BACK:-1}"
          days_fwd="${DAYS_FWD:-6}"
          odds="${ODDS:-true}"
          h2h="${H2H:-true}"
          max_leagues="${MAX_LEAGUES:-120}"
          max_probes="${MAX_PROBES:-400}"
          request_budget="${REQUEST_BUDGET:-6000}"
          sleep_ms="${SLEEP_MS:-1500}"

          cat > config.txt <<EOF
          API_KEY=${football_key}
          STATS_API_KEY=${STATS_API_KEY:-}
          SEASON=${season}
          LEAGUES=${leagues}
          DAYS_BACK=${days_back}
          DAYS_FWD=${days_fwd}
          ODDS=${odds}
          H2H=${h2h}
          STATS=true
          MAX_LEAGUES=${max_leagues}
          MAX_PROBES=${max_probes}
          REQUEST_BUDGET=${request_budget}
          SLEEP_MS=${sleep_ms}
          SOT_LOOKBACK=8
          SOT_CALL_BUDGET=120
          SOT_SLEEP_MS=250
          EOF

          echo "Configuration created successfully."
          echo "Fixture window: ${days_back} day(s) back and ${days_fwd} day(s) forward."

      - name: Pull future fixtures and rebuild predictions
        run: node fetch-data.js

      - name: Enrich fixtures with Stats API data
        run: node enrich-xg.js
        continue-on-error: true

      - name: Verify seven-day coverage
        run: node verify-week-data.js

      - name: Generate public health snapshot
        run: node generate-site-health.js
        continue-on-error: true

      - name: Run repository consistency audit
        run: node audit-site.js
        continue-on-error: true

      - name: Commit updated fixture data
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "Predict2U Fixture Bot"
          git config user.email "actions@users.noreply.github.com"

          git add \
            data.js \
            week-fixture-report.json \
            team-profiles.json \
            odds-calib.json \
            model-calibration.json \
            engine-learning-ledger.json \
            engine-learning-report.json \
            engine-consensus-report.json \
            match-context-report.json \
            model-governance-report.json \
            model-governance-audit.json \
            site-health.json \
            site-audit.json 2>/dev/null || true

          if git diff --cached --quiet; then
            echo "No fixture changes to commit."
            exit 0
          fi

          git commit -m "Update seven-day fixtures"
          git pull --rebase
          git push
