# v248: legacy workflow kept for emergency manual use only.
name: Update Predicto data
# FULL fetch: fixtures, odds, standings, team stats, streaks (fetch-data.js),
# then real-xG enrichment (enrich-xg.js) and the branded daily image
# (generate-image.js). This is the SLOW one — can run 30-90+ minutes depending
# on how many leagues have games. Commits data.js / xg.js / today.png when done.
on:
  workflow_dispatch: {}

permissions:
  contents: write
  pages: write
  id-token: write
# CONCURRENCY (fixed): this long fetch runs in its OWN group so a scheduled
# scores run, a publish, or a second data trigger can NEVER cancel it mid-fetch
# (that was killing the run at ~40 min before the commit step). cancel-in-progress
# is false: if a data run is already going, a new one waits instead of clobbering.
concurrency:
  group: predict2u-data-write
  cancel-in-progress: false
jobs:
  build:
    runs-on: ubuntu-latest
    # generous ceiling so a big fixture day never gets timed-out mid-fetch.
    timeout-minutes: 150
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build temporary configuration from repository secrets
        shell: bash
        env:
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
          API_KEY: ${{ secrets.API_KEY }}
          STATS_API_KEY: ${{ secrets.STATS_API_KEY }}
          SEASON: ${{ secrets.SEASON }}
          LEAGUES: ${{ secrets.LEAGUES }}
          DAYS_BACK: ${{ secrets.DAYS_BACK }}
          DAYS_FWD: ${{ secrets.DAYS_FWD }}
          ODDS: ${{ secrets.ODDS }}
          H2H: ${{ secrets.H2H }}
          REQUEST_BUDGET: ${{ secrets.REQUEST_BUDGET }}
          SLEEP_MS: ${{ secrets.SLEEP_MS }}
        run: |
          set -euo pipefail
          football_key="${API_FOOTBALL_KEY:-${API_KEY:-}}"
          if [[ -z "$football_key" ]]; then
            echo "Missing API_FOOTBALL_KEY or API_KEY"
            exit 1
          fi
          if [[ -z "${LEAGUES:-}" ]]; then
            echo "Missing LEAGUES repository secret for the legacy full fetch."
            exit 1
          fi
          cat > config.txt <<EOF
          API_KEY=${football_key}
          STATS_API_KEY=${STATS_API_KEY:-}
          SEASON=${SEASON:-$(date -u +%Y)}
          LEAGUES=${LEAGUES}
          DAYS_BACK=${DAYS_BACK:-0}
          DAYS_FWD=${DAYS_FWD:-6}
          ODDS=${ODDS:-true}
          H2H=${H2H:-true}
          STATS=true
          MAX_LEAGUES=0
          MAX_PROBES=10000
          REQUEST_BUDGET=${REQUEST_BUDGET:-12000}
          SLEEP_MS=${SLEEP_MS:-1500}
          EOF

      - name: Run the fetcher (fixtures, odds, standings, stats)
        run: node fetch-data.js || echo "fetch-data skipped/partial"

      - name: Enrich with real xG (TheStatsAPI)
        run: node enrich-xg.js || echo "xG enrichment skipped"

      - name: Generate daily branded image
        run: |
          npm install sharp --no-save || echo "sharp install issue"
          node generate-image.js || echo "image generation skipped"

      - name: Remove temporary secret configuration
        run: rm -f config.txt

      - name: Compact generated match data
        run: node compact-generated-data.js

      - name: Build compact public data bundle
        run: node build-public-data.js

      - name: Commit updated data.js (if changed)
        run: |
          git config user.name "predicto-bot"
          git config user.email "bot@users.noreply.github.com"
          if [ -z "$(git status --porcelain data.js current-data.js data-meta.json xg.js today.png today.svg daily/ 2>/dev/null)" ]; then
            echo "No changes."; exit 0
          fi
          # Add each output individually. A single `git add` with ALL paths dies
          # with a SILENT exit 128 if ANY one path doesn't exist ("fatal: pathspec
          # did not match" is hidden by 2>/dev/null but the exit code still kills
          # the -e shell). Guard per path, then confirm something is staged.
          for p in data.js current-data.js data-meta.json xg.js today.png today.svg today-*.png today-*.svg acca.png acca.svg acca-*.png acca-*.svg daily/; do
            git add -- $p 2>/dev/null || echo "note: $p not present - skipped"
          done
          if git diff --staged --quiet; then echo "Nothing staged."; exit 0; fi
          git commit -m "Update Predicto data (fixtures + xG + image)"
          # Guarantee a CLEAN tree before rebase. Anything not part of this commit
          # (restored config.txt, node_modules, package-lock, stray build files) is
          # discarded here so `git rebase` can't abort with exit 128 on a dirty tree.
          git stash -u 2>/dev/null || true
          git stash drop 2>/dev/null || true
          # Generated files — on a race with the scores workflow, keep OUR fresh copy.
          # NOTE: during a rebase, --ours/--theirs are INVERTED (--ours = origin's
          # side). The old `git checkout --ours` therefore kept the STALE remote
          # data.js while claiming to keep ours — pushes were silently wrong or
          # aborted. `git rebase -X theirs` correctly favors THIS run's files.
          PUSHED=0
          for i in 1 2 3 4 5; do
            git fetch origin main
            if ! git rebase -X theirs origin/main; then
              echo "Rebase failed even with -X theirs — aborting and retrying."
              git rebase --abort 2>/dev/null || true
              sleep $((5 * i)); continue
            fi
            if git push origin HEAD:main; then echo "pushed (attempt $i)."; PUSHED=1; break; fi
            echo "Push attempt $i failed (remote moved) — syncing and retrying..."; sleep $((5 * i))
          done
          if [ "$PUSHED" != "1" ]; then
            echo "ERROR: failed to push after 5 attempts — data.js NOT published."
            exit 1
          fi
