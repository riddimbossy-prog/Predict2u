name: Daily tracker email
# Runs each morning, refreshes the forward tracker (settles finished picks,
# records new ones), then emails the per-engine / per-market / per-league
# performance report so you can monitor which engines actually work — without
# opening the repo. Reuses the same Gmail secrets as the results email.

on:
  schedule:
    - cron: "45 0 * * *"     # 00:45 UTC daily (after the results email at 00:30)
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: predict2u-data-write
  cancel-in-progress: false

jobs:
  tracker:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Build report from the committed tracker log
        run: node track-log.js report || echo "tracker report skipped"
      - name: Read report into an output
        id: rpt
        run: |
          if [ -f track-report.txt ]; then
            echo "body<<REPORT_EOF" >> "$GITHUB_OUTPUT"
            cat track-report.txt >> "$GITHUB_OUTPUT"
            echo "REPORT_EOF" >> "$GITHUB_OUTPUT"
          else
            echo "body=No tracker report generated today (no settled data yet)." >> "$GITHUB_OUTPUT"
          fi
      - name: Email the tracker report
        continue-on-error: true
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "Predict2u — Engine Tracker Report"
          to: predict2u@gmail.com
          from: Predict2u Bot
          body: |
            Your daily Predict2u forward-tracker report — which engines, markets,
            and leagues are performing, from real before-kickoff picks.

            ${{ steps.rpt.outputs.body }}

            (Full log attached. Numbers only become meaningful past ~100 settled
            picks per engine. 18+. Gamble responsibly.)
          attachments: track-report.txt
