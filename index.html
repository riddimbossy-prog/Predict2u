<!-- Nav with Strict Toggle -->
<div class="flex items-center gap-3">
  <label class="flex items-center gap-2 text-sm cursor-pointer panel-2 rounded-xl px-3 py-1.5 hover:bg-gold/10">
    <input id="strict-mode" type="checkbox" class="accent-yellow-500" />
    <span class="font-medium">Strict Banker Mode</span>
  </label>
  <button id="theme-toggle" class="w-9 h-9 rounded-xl panel-2 flex items-center justify-center hover:text-gold transition-colors" title="Toggle theme">

<!-- Buy Me a Coffee Bar -->
<div id="bmc-bar" class="hidden panel border-0 border-b py-3 text-center bg-amber-900/30">
  <a href="https://buymeacoffee.com/predict2u" target="_blank" class="inline-flex items-center gap-3 px-6 py-3 bg-amber-500 hover:bg-amber-600 rounded-2xl text-black font-medium">
    <i class="fa-solid fa-mug-hot text-xl"></i>
    <span>Support Predict2u with a Coffee ☕</span>
  </a>
</div>

<script src="banker-engine.js"></script>
<script src="data.js"></script>
<script>
  // Safe fallback if renderAll doesn't exist
  if (typeof renderAll === 'undefined') {
    window.renderAll = function() { console.log('renderAll called (fallback)'); };
  }

  // Strict Mode + Buy Me a Coffee
  let useStrictMode = false;
  const strictToggle = document.getElementById('strict-mode');
  const bmcBar = document.getElementById('bmc-bar');

  strictToggle.addEventListener('change', function() {
    useStrictMode = this.checked;
    bmcBar.classList.toggle('hidden', !useStrictMode);
    console.log('Strict Banker Mode:', useStrictMode ? 'ON' : 'OFF');
    if (typeof renderAll === 'function') renderAll();
  });

  // Initial render
  if (typeof renderAll === 'function') renderAll();
</script>
